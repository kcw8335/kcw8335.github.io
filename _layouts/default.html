<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap header-inner">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
          <span class="brand-mark">CS</span>
          <span>
            <strong>{{ site.title }}</strong>
            <small>crypto investment research</small>
          </span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}">리뷰</a>
          <a href="{{ '/methodology/' | relative_url }}">분석 틀</a>
          <a href="{{ '/reading-list/' | relative_url }}">읽을 목록</a>
          <a href="{{ '/workflow/' | relative_url }}">운영 흐름</a>
          <a href="{{ '/copyright-policy/' | relative_url }}">저작권 원칙</a>
        </nav>
      </div>
    </header>

    <main class="wrap page">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="wrap footer-inner">
        <span>Research notes, not financial advice.</span>
        <span>Built for GitHub Pages.</span>
      </div>
    </footer>
  </body>
</html>
