<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
          <span class="brand-mark">CS</span>
          <span>{{ site.title }}</span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}">Reviews</a>
          <a href="{{ '/methodology/' | relative_url }}">Method</a>
          <a href="{{ '/reading-list/' | relative_url }}">Queue</a>
          <a href="{{ '/workflow/' | relative_url }}">Workflow</a>
          <a href="{{ '/copyright-policy/' | relative_url }}">Copyright</a>
        </nav>
      </header>
      <main>
        {{ content }}
      </main>
      <footer class="site-footer">
        <p class="site-footer">
          Research notes, not financial advice. Card layout inspired by
          <a href="https://claude.com/blog" target="_blank" rel="noopener">Claude Blog</a>.
        </p>
      </footer>
    </div>
  </body>
</html>
