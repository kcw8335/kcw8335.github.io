<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/font_sans_serif.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style-no-dark-mode.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/publications-no-dark-mode.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <p class="site-kicker">Crypto investment research notes</p>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}">리뷰</a>
          <a href="{{ '/methodology/' | relative_url }}">분석 틀</a>
          <a href="{{ '/reading-list/' | relative_url }}">읽을 목록</a>
          <a href="{{ '/workflow/' | relative_url }}">운영 흐름</a>
          <a href="{{ '/copyright-policy/' | relative_url }}">저작권 원칙</a>
        </nav>
      </header>
      <section>
        {{ content }}
        <p class="site-footer">
          Research notes, not financial advice. Powered by Jekyll and
          <a href="https://github.com/yaoyao-liu/minimal-light" target="_blank" rel="noopener">Minimal Light</a>.
        </p>
      </section>
      <footer></footer>
    </div>
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
  </body>
</html>
